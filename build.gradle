plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    namespace 'com.nomad.client'
    compileSdk 34

    defaultConfig {
        minSdk 24
        targetSdk 34
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

// 零外部依赖 —— 仅使用 Android SDK 自带的 org.json 和 java.net
dependencies {
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = 'com.nomad'
                artifactId = 'nomad-android-client'
                version = '1.0.0'
            }
        }
    }
}
